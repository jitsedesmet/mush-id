server {
    listen 80;
    root /usr/share/nginx/html;
    index 200.html;

    # Serve static assets directly; fall back to the SPA entry point for
    # all other paths so that client-side routing works correctly.
    location / {
        try_files $uri $uri/ /200.html;
    }

    # Cache immutable assets (hashed filenames) for one year.
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
